<div class="stock-card stock-card--{{isChecked ? stock().state : 'off'}}">

    <div class="stock-card__header">
        <h3 class="stock-card__title">{{stock().symbol}}</h3>
    </div>

    <div class="stock-card__body">

        <div class="stock-card__row">
            <span class="stock-card__label">Price</span>
            <span [class.stock-card__value--flash]="isFlashing()"
                class="stock-card__value stock-card__value--{{stock().state}}">
                ${{stock().price}}
            </span>
        </div>

        <div class="stock-card__row">
            <span class="stock-card__label">High</span>
            <span class="stock-card__value">${{stock().high}}</span>
        </div>

        <div class="stock-card__row">
            <span class="stock-card__label">Low</span>
            <span class="stock-card__value">${{stock().low}}</span>
        </div>

        <div class="stock-card__extra">
            <div class="stock-card__row">
                <span class="stock-card__label">52W High</span>
                <span class="stock-card__value">${{stock().fiftyTwoWeekHigh}}</span>
            </div>

            <div class="stock-card__row">
                <span class="stock-card__label">52W Low</span>
                <span class="stock-card__value">${{stock().fiftyTwoWeekLow}}</span>
            </div>
        </div>

        <div class="stock-card__footer">
            <mat-slide-toggle (change)="toggleSocketSubs($event.checked)" [(ngModel)]="isChecked"
                class="stock-card__toggle">
                <span class="stock-card__toggle--{{isChecked ? 'on' : 'off'}}">
                    {{isChecked ? 'ON' : 'OFF'}}
                </span>
            </mat-slide-toggle>
        </div>

    </div>
</div>
